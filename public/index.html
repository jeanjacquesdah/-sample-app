<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sample App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; font-weight: 700; }
    p { color: #94a3b8; text-align: center; max-width: 420px; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    input {
      width: 100%;
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 0.75rem;
    }
    button {
      width: 100%;
      padding: 0.65rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #result {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #0f172a;
      border-radius: 8px;
      font-family: monospace;
      color: #4ade80;
      display: none;
    }
  </style>
</head>
